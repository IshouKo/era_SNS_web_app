<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Era{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/era.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('main.index') }}"><img src="{{ url_for('static', filename='img/Eraicon.png') }}" alt="">Era</a>
    <input class="search" type="search" placeholder="興味のある内容を検索">
    <nav class="top-actions">
      {% if 'user_id' in session %}
        <a class="icon-button" href="{{ url_for('main.messages') }}" title="メッセージ">✉</a>
        <a class="icon-button" href="{{ url_for('main.notifications') }}" title="通知">🔔</a>
        <a href="{{ url_for('main.profile', username=session['username']) }}"><strong>{{ session['username'] }}</strong></a>
        <a class="muted" href="{{ url_for('auth.logout') }}">ログアウト</a>
      {% else %}
        <a class="muted" href="{{ url_for('auth.login') }}">ログイン</a>
        <a class="secondary-button" href="{{ url_for('auth.register') }}">登録</a>
      {% endif %}
    </nav>
  </header>

  <main class="admin-wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
