<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新しいパスワード - Era</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/era.css') }}">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>新しいパスワード</h1>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="password" name="password" minlength="8" placeholder="新しいパスワード" required>
        <button class="primary-button" type="submit">更新</button>
      </form>
    </section>
  </main>
</body>
</html>
