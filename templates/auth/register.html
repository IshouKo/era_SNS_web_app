<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新規登録 - Era</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/era.css') }}">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <a class="brand" href="{{ url_for('auth.login') }}"><img src="{{ url_for('static', filename='img/Eraicon.png') }}" alt="">Era</a>
      <h1>新規登録</h1>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
      {% endwith %}
      <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="username" placeholder="ユーザー名" required>
        <input type="date" name="birth_date" required>
        <input type="email" name="email" placeholder="メールアドレス" required>
        <input type="password" name="password" placeholder="パスワード" minlength="8" required>
        <textarea name="bio" placeholder="自己紹介（任意）" rows="3"></textarea>
        <input type="file" id="profile_image_file" name="profile_image_file" accept="image/*">
        <button class="primary-button" type="submit">本人確認に進む</button>
      </form>
      <p class="muted">年齢は公開せず、Safe Zone の分類だけに使います。</p>
      <p class="muted">アカウントをお持ちですか？ <a href="{{ url_for('auth.login') }}">ログイン</a></p>
    </section>
  </main>
</body>
</html>
