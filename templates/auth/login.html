<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン - Era</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/era.css') }}">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <a class="brand" href="{{ url_for('main.index') }}"><img src="{{ url_for('static', filename='img/Eraicon.png') }}" alt="">Era</a>
      <h1>ログイン</h1>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
      {% endwith %}
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="username" placeholder="ユーザー名" required>
        <input type="password" name="password" placeholder="パスワード" required>
        <button class="primary-button" type="submit">ログイン</button>
      </form>
      <p class="muted"><a href="{{ url_for('auth.forgot_password') }}">パスワードを忘れた場合</a></p>
      <p class="muted">アカウントをお持ちでないですか？ <a href="{{ url_for('auth.register') }}">登録</a></p>
    </section>
  </main>
</body>
</html>
