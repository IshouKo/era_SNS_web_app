services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sns_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: . # Dockerfileがeraフォルダの直下にあるので、ビルドコンテキストは '.' でOK
    ports:
      - "5001:5000" # 必要であれば "5001:5000" などに変更
    volumes:
      - .:/code # ★プロジェクトルート (era) 全体をコンテナの /code にマウント
    working_dir: /code # ★コンテナ内の作業ディレクトリを /code に設定
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /code
      OPENAI_API_KEY: ""
      APP_BASE_URL: http://localhost:5001
    depends_on:
      - db
    command: >
      sh -c "pip install -r requirements.txt &&
             flask --app app init-db &&
             gunicorn -w 2 -b 0.0.0.0:5000 'app:create_app()'"
    stdin_open: true # 標準入力を開く (Pythonがよりインタラクティブになる)
    tty: true        # 擬似TTYを割り当てる (ログ表示を改善)

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://web:5000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - web

volumes:
  db_data:
